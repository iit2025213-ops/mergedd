# ==============================================================================
# CHAOS ENGINEERING & HAWKES PROCESS CONFIGURATION
# Ported from M5 Chaos Forecasting (Repo 1) — all original parameters preserved.
# ==============================================================================

# --- Global Toggle ---
# When false, all chaos perturbations use i.i.d. Bernoulli (original behaviour).
use_hawkes: true

# --- Hawkes Process Parameters ---
# Intensity: λ(t) = μ + Σ α·exp(-β·(t - tₖ))
# μ is DERIVED from the chaos intensity via Poisson inverse link:
#     μ = -ln(1 - p_base)
# Only α (excitation) and β (decay) are swept.
#
# Branching ratio n = α/β must be < 1 for stationarity.
#
# References:
#   - Bacry, Mastromatteo & Muzy (2015): n ∈ [0.7, 0.9] in finance
#   - Filimonov & Sornette (2014): corrected n ∈ [0.6, 0.8]
#   - Bao & Bhatt (2014): n ∈ [0.3, 0.7] in infrastructure cascades
#   - Ogata (1988): ETAS seismology model, subcritical regimes
hawkes:
  alpha_values: [0.15, 0.4, 0.7]
  beta_values: [1.0, 2.0, 5.0]
  default_alpha: 0.4
  default_beta: 1.0

  # Branching ratio matrix (all subcritical ✓):
  #   α=0.15: n ∈ {0.15, 0.075, 0.03}  — mild cascade
  #   α=0.40: n ∈ {0.40, 0.20, 0.08}   — moderate (infrastructure regime)
  #   α=0.70: n ∈ {0.70, 0.35, 0.14}   — strong (financial regime)

# --- Chaos Monkey — Random Failures ---
chaos_monkey:
  missing_data_probs: [0.1, 0.3, 0.5]
  noise_sigmas: [0.5, 1.0, 2.0]
  feature_dropout_probs: [0.1, 0.3, 0.5]
  batch_corruption_fracs: [0.1, 0.2, 0.3]

# --- Chaos Kong — Large-Scale Failures ---
chaos_kong:
  store_removal_counts: [1, 3, 5]
  temporal_outage_days: [7, 14, 28]
  demand_spike_alphas: [2.0, 5.0, 10.0]
  demand_spike_frac: 0.1

# --- Experiment Settings ---
experiment:
  random_seeds: [42, 123, 456]
  default_seed: 42

  failure_types:
    - "missing_data"
    - "noise_injection"
    - "feature_dropout"
    - "batch_corruption"
    - "store_removal"
    - "temporal_outage"
    - "demand_spike"

# --- Data Settings (from Repo 1) ---
data:
  horizon: 28
  end_train_day: 1885
  total_days: 1913
  sample_n_items: null    # null = full dataset

# --- Output Directories ---
output:
  results_dir: "experiments/results"
  intensity_traces_dir: "experiments/results/intensity_traces"
  plots_dir: "analysis/plots"
  models_dir: "models_saved"
